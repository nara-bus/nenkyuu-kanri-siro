<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出勤時間管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #b8e0d2 0%, #dff2ea 50%, #c8e8da 100%);
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic Pro", "Yu Gothic", sans-serif;
    color: #2d5a47;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
  }
  .header {
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(160,215,190,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(80,160,120,0.2);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header-label {
    font-size: 11px;
    color: #5a8f78;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .header-date { font-size: 13px; color: #5a8f78; }
  .header-time {
    font-size: 28px;
    font-weight: 800;
    color: #2d6e52;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .tab-bar {
    display: flex;
    gap: 4px;
    background: rgba(140,200,170,0.45);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 12px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    color: #6a9e85;
    background: transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(60,155,105,0.75);
    color: #ffffff;
    font-weight: 700;
  }
  .content { padding: 8px 16px 40px; }
  .section-label {
    font-size: 11px;
    color: #6a9e85;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 4px 4px;
  }
  .day-block {
    border-radius: 18px;
    padding: 0 0 4px;
    border: 1px solid rgba(100,180,140,0.2);
    margin-bottom: 8px;
    background: rgba(255,252,238,0.82);
  }
  .day-block.today {
    background: rgba(255,250,230,0.96);
    border-color: rgba(60,155,105,0.45);
    box-shadow: 0 2px 14px rgba(60,155,105,0.12);
  }
  .day-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 8px;
  }
  .day-num-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 42px;
  }
  .day-num {
    font-size: 22px;
    font-weight: 800;
    color: #2d5a47;
    line-height: 1;
  }
  .day-block.today .day-num { color: #2d8a5e; }
  .day-dow { font-size: 13px; font-weight: 700; }
  .today-badge {
    display: inline-block;
    font-size: 10px;
    background: #3d9e6e;
    color: #fff;
    border-radius: 99px;
    padding: 1px 7px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }
  .tags { display: flex; align-items: center; gap: 6px; }
  .daytype-tag {
    font-size: 11px;
    border-radius: 99px;
    padding: 1px 8px;
    font-weight: 600;
  }
  .dia-tag { font-size: 14px; color: #3a7a5e; font-weight: 600; cursor: pointer; }
  .dia-tag:active { opacity: 0.7; }
  .dia-override { color: #b07020; }
  /* ダイヤ変更テンキー */
  .dia-numpad-box {
    background: #fff; border-radius: 20px;
    padding: 20px 16px 16px; width: 300px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .dia-numpad-title { text-align: center; font-size: 13px; font-weight: 700; color: #3d9e6e; margin-bottom: 10px; }
  .dia-numpad-date { text-align: center; font-size: 12px; color: #6a9e85; margin-bottom: 12px; }
  .dia-numpad-display {
    background: #edfaf3; border-radius: 10px; padding: 10px 16px;
    text-align: center; font-size: 32px; font-weight: 800; color: #1e293b;
    margin-bottom: 12px; min-height: 56px; letter-spacing: 0.05em;
    border: 2px solid #3d9e6e;
  }
  .dia-numpad-reset {
    text-align: center; font-size: 11px; color: #3d9e6e;
    margin-bottom: 8px; cursor: pointer; text-decoration: underline;
  }
  .shift-area { padding: 0 12px 4px; }
  .shift-cards { display: flex; flex-direction: column; gap: 8px; }
  .shift-card {
    background: rgba(255,252,240,0.95);
    border-radius: 14px;
    padding: 12px 16px;
    border: 1px solid rgba(100,180,140,0.2);
  }
  .shift-sublabel {
    font-size: 11px;
    color: #6a9e85;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .shift-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(100,180,140,0.15);
  }
  .shift-row:last-of-type { border-bottom: none; }
  .shift-icon { font-size: 18px; min-width: 26px; text-align: center; }
  .shift-label { flex: 1; font-size: 13px; color: #5a8a72; font-weight: 500; letter-spacing: 0.02em; }
  .shift-time { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .rosen-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 6px;
  }
  .rosen-icon { font-size: 14px; }
  .rosen-label { font-size: 12px; color: rgba(60,120,90,0.55); }
  .rosen-val { font-size: 13px; color: #2d8a5e; font-weight: 600; }
  .kyukyu-card {
    background: rgba(255,252,240,0.95);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid rgba(100,180,140,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 70px;
  }
  .kyukyu-icon { font-size: 22px; }
  .kyukyu-text { font-size: 18px; font-weight: 700; color: #6a9e85; }
  .footer {
    text-align: center;
    padding: 0 20px 30px;
    color: #90c0a8;
    font-size: 11px;
  }
  .settings-section {
    background: rgba(255,252,240,0.95);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid rgba(100,180,140,0.2);
    margin-bottom: 14px;
  }
  .settings-title {
    font-size: 13px;
    color: #4a8a6a;
    font-weight: 700;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(100,180,140,0.18);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid rgba(100,180,140,0.12);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 13px; color: #3a6e55; font-weight: 500; }
  .settings-row-sub { font-size: 11px; color: #80aa92; margin-top: 2px; }
  .settings-input {
    background: rgba(210,240,225,0.7);
    border: 1px solid rgba(100,180,140,0.4);
    border-radius: 8px;
    color: #2d5a47;
    font-size: 16px;
    font-weight: 700;
    padding: 7px 10px;
    text-align: center;
    font-family: inherit;
    width: 80px;
    -webkit-appearance: none;
    inputmode: numeric;
  }
  .settings-input:focus { outline: none; border-color: #3d9e6e; box-shadow: 0 0 0 2px rgba(61,158,110,0.25); }
  .settings-input-hm { width: 54px; font-size: 15px; }
  .settings-input-date {
    background: rgba(210,240,225,0.7);
    border: 1px solid rgba(100,180,140,0.4);
    border-radius: 8px;
    color: #2d5a47;
    font-size: 14px;
    font-weight: 600;
    padding: 7px 10px;
    font-family: inherit;
    width: 160px;
    -webkit-appearance: none;
    color-scheme: light;
  }
  .settings-input-date:focus { outline: none; border-color: #3d9e6e; box-shadow: 0 0 0 2px rgba(61,158,110,0.25); }
  .hm-wrap { display: flex; align-items: center; gap: 4px; }
  .hm-input {
    background: rgba(210,240,225,0.7);
    border: 1px solid rgba(100,180,140,0.4);
    border-radius: 8px;
    color: #2d5a47;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 0;
    text-align: center;
    font-family: inherit;
    width: 52px;
  }
  .hm-input:focus { outline: none; border-color: #3d9e6e; box-shadow: 0 0 0 2px rgba(61,158,110,0.25); }
  .hm-unit { font-size: 12px; color: #80aa92; white-space: nowrap; }
  .unit-label { font-size: 12px; color: #80aa92; margin-left: 4px; white-space: nowrap; }
  .input-unit-wrap { display: flex; align-items: center; }
  .toggle-wrap { position: relative; display: inline-block; width: 50px; height: 28px; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(130,185,155,0.35); border-radius: 28px; transition: 0.3s;
    border: 1px solid rgba(100,180,140,0.3);
  }
  .toggle-slider:before {
    position: absolute; content: "";
    height: 22px; width: 22px; left: 2px; bottom: 2px;
    background: white; border-radius: 50%; transition: 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-wrap input:checked + .toggle-slider { background: #3d9e6e; border-color: #3d9e6e; }
  .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(22px); }
  .save-btn {
    width: 100%;
    padding: 14px;
    background: #3d9e6e;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
    transition: background 0.2s;
    letter-spacing: 0.05em;
  }
  .save-btn:active { background: #2d7e56; }
  .save-msg {
    text-align: center;
    font-size: 13px;
    color: #2d8a5e;
    margin-top: 10px;
    min-height: 20px;
    font-weight: 600;
  }
  .today-dia-display {
    text-align: center;
    font-size: 13px;
    color: #6a9e85;
    background: rgba(61,158,110,0.08);
    border: 1px solid rgba(61,158,110,0.2);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
  }
  .today-dia-display strong { color: #2d8a5e; font-size: 20px; margin: 0 4px; }
  .numpad-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 200; display: flex; align-items: center; justify-content: center;
  }
  .numpad-box {
    background: #fff; border-radius: 20px;
    padding: 20px 16px 16px; width: 300px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .numpad-title {
    text-align: center; font-size: 13px; font-weight: 700;
    color: #3d9e6e; margin-bottom: 14px; letter-spacing: 0.05em;
  }
  .numpad-display-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 14px;
  }
  .numpad-seg {
    flex: 1; padding: 10px 6px; border-radius: 10px;
    background: #edfaf3; border: 2px solid transparent;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .numpad-seg.active { background: #d5f5e5; border-color: #3d9e6e; }
  .numpad-seg-val { font-size: 28px; font-weight: 800; color: #1e293b; line-height: 1; }
  .numpad-seg-lbl { font-size: 11px; color: #6a9e85; margin-top: 2px; }
  .numpad-colon { font-size: 24px; font-weight: 800; color: #90c0a8; }
  .numpad-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-bottom: 10px;
  }
  .nk {
    background: #edfaf3; border: none; border-radius: 12px;
    color: #1e293b; font-size: 22px; font-weight: 700;
    padding: 16px 0; cursor: pointer; font-family: inherit;
    transition: background 0.1s;
  }
  .nk:active { background: #b5e8cf; }
  .nk-clear { background: #fee2e2; color: #ef4444; font-size: 16px; font-weight: 700; }
  .nk-clear:active { background: #fca5a5; }
  .nk-del { background: #fee2e2; color: #ef4444; font-size: 18px; }
  .nk-del:active { background: #fca5a5; }
  .numpad-actions { display: flex; gap: 8px; }
  .nk-cancel {
    flex: 1; padding: 13px; background: #edfaf3;
    border: none; border-radius: 12px; color: #6a9e85;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .nk-ok {
    flex: 2; padding: 13px; background: #3d9e6e;
    border: none; border-radius: 12px; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .nk-ok:active { background: #2d7e56; }
  .hidden { display: none !important; }
  /* 出勤時間臨時変更テンキー専用スタイル */
  .shukkin-numpad-box {
    background: #fff; border-radius: 20px;
    padding: 20px 16px 16px; width: 300px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .shukkin-numpad-title {
    text-align: center; font-size: 13px; font-weight: 700;
    color: #b8355a; margin-bottom: 6px;
  }
  .shukkin-numpad-date { text-align: center; font-size: 12px; color: #6a9e85; margin-bottom: 10px; }
  .shukkin-numpad-reset {
    text-align: center; font-size: 11px; color: #b8355a;
    margin-bottom: 10px; cursor: pointer; text-decoration: underline;
  }

  /* ファイル保存・読込ボタン */
  .file-btn-bar {
    display: flex; gap: 8px; padding: 0 0 12px;
  }
  .file-btn {
    flex: 1; padding: 9px 0; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: background 0.18s; letter-spacing: 0.04em;
  }
  .file-btn-save { background: #3d9e6e; color: #fff; }
  .file-btn-save:active { background: #2d7e56; }
  .file-btn-load { background: rgba(100,180,140,0.22); color: #2d6e52; border: 1px solid rgba(80,160,120,0.3); }
  .file-btn-load:active { background: rgba(100,180,140,0.4); }
  /* 警告モーダル */
  .alert-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .alert-box {
    background: #fff; border-radius: 20px;
    padding: 30px 24px 22px; width: 310px; max-width: 90vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22);
    text-align: center;
  }
  .alert-icon { font-size: 40px; margin-bottom: 10px; }
  .alert-title {
    font-size: 15px; font-weight: 700; color: #c0392b;
    line-height: 1.6; margin-bottom: 20px;
  }
  .alert-ok {
    width: 100%; padding: 13px; background: #3d9e6e;
    border: none; border-radius: 12px; color: #fff;
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .alert-ok:active { background: #2d7e56; }

  /* 保存モーダル */
  #save-modal-overlay {
    display:none;position:fixed;inset:0;z-index:400;
    background:rgba(0,0,0,0.45);align-items:center;justify-content:center;
    backdrop-filter:blur(3px);
  }
  #save-modal-overlay.open { display:flex; }
  .io-sheet {
    background:#fff;border-radius:22px;padding:24px 20px 20px;
    width:calc(100% - 40px);max-width:360px;
    box-shadow:0 12px 50px rgba(0,0,0,0.25);
    border:1px solid rgba(200,200,200,0.3);
  }
  .io-title {
    text-align:center;font-size:16px;font-weight:700;color:#1a4a30;
    margin-bottom:16px;
  }
  .io-info {
    background:rgba(240,255,248,0.8);border-radius:10px;padding:12px 14px;
    font-size:13px;color:#555;margin-bottom:16px;
    line-height:1.7;border:1px solid rgba(100,200,150,0.2);
  }
  .io-info strong { color:#1a4a30;font-weight:700; }
  .io-action-row { display:flex;gap:10px; }
  .io-btn-cancel {
    flex:1;padding:12px 0;border-radius:12px;border:1px solid #ccc;
    background:#f5f5f5;color:#555;font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .io-btn-ok {
    flex:1;padding:12px 0;border-radius:12px;border:none;
    background:#3d9e6e;color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .io-btn-ok:active { background:#2d7e56; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-label">出勤時間管理</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('week')">📋 予定</button>
    <button class="tab-btn" onclick="switchTab('settings')">⚙️ 設定</button>
  </div>
  <div class="file-btn-bar">
    <button class="file-btn file-btn-save" onclick="saveAppToFile()">💾 保存</button>
    <button class="file-btn file-btn-load" onclick="loadAppFromFile()">📂 読込</button>
  </div>
</div>

<div class="content">
  <div id="view-today-tomorrow"></div>
  <div id="view-week" class="hidden"></div>
  <div id="view-settings" class="hidden"></div>
</div>

<div class="footer">Bダイヤ 2026.4.1 ／ 57日サイクル（設定画面で基準日・ダイヤ番号を設定）</div>

function isDefaultSettings(s) {
  // ダイヤ番号(baseDia)以外で、どれか1つでもデフォルト値と同じなら true → 警告
  if (s.baseDate        === DEFAULT_SETTINGS.baseDate)        return true;
  if ((s.wakeBeforeLeave   ?? DEFAULT_SETTINGS.wakeBeforeLeave)   === DEFAULT_SETTINGS.wakeBeforeLeave)   return true;
  if ((s.leaveBeforeWork   ?? DEFAULT_SETTINGS.leaveBeforeWork)   === DEFAULT_SETTINGS.leaveBeforeWork)   return true;
  if ((s.arriveBeforeStart ?? DEFAULT_SETTINGS.arriveBeforeStart) === DEFAULT_SETTINGS.arriveBeforeStart) return true;
  if ((s.returnAfterEnd    ?? DEFAULT_SETTINGS.returnAfterEnd)    === DEFAULT_SETTINGS.returnAfterEnd)    return true;
  return false;
}

function loadSettings() {
  try {
    const s = localStorage.getItem('shiftSettings');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return Object.assign({}, DEFAULT_SETTINGS);
}
function saveSettings(s) {
  try { localStorage.setItem('shiftSettings', JSON.stringify(s)); } catch(e) {}
}

let SETTINGS = loadSettings();

function getBaseDate() {
  const parts = (SETTINGS.baseDate || '2026-04-01').split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}
function getBaseDia() { return parseInt(SETTINGS.baseDia) || 1; }
function getCycle()   { return parseInt(SETTINGS.cycle) || 57; }

function getDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDiaForDate(date) {
  const start = getBaseDate(); start.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.round((d - start) / 86400000);
  const cycle = getCycle();
  return ((diff + getBaseDia() - 1) % cycle + cycle) % cycle + 1;
}

function getDayType(date) {
  const dow = date.getDay();
  const key = getDateKey(date);
  if (HOLIDAYS.has(key) || dow === 0) return '日祝';
  if (dow === 6) return '土曜';
  return '平日';
}

function getSchedule(date) {
  const key = getDateKey(date);
  const dayType = getDayType(date);
  const dia = DIA_OVERRIDES[key] !== undefined ? DIA_OVERRIDES[key] : getDiaForDate(date);
  const diaData = SCHEDULES[String(dia)];
  if (!diaData) return { dia, dayType, kyukyu: true };
  const hasShift = diaData['平日'] || diaData['土曜'] || diaData['日祝'];
  if (!hasShift) return { dia, dayType, kyukyu: true };
  let shiftData = diaData[dayType] || (dayType === '日祝' ? diaData['土曜'] : null);
  if (!shiftData || shiftData.kyukyu) return { dia, dayType, kyukyu: true };
  const rawShifts = Array.isArray(shiftData) ? shiftData : [shiftData];
  const shifts = rawShifts.map(sh => Object.assign({}, sh, {_dateKey: key}));
  return { dia, dayType, shifts };
}

function fmtTime(t) {
  if (!t) return '—';
  if (t.startsWith('+')) return '翌' + t.slice(1);
  return t;
}

// "HH:MM" or "+HH:MM" → 総分数
function timeToMin(t) {
  if (!t) return null;
  const nextDay = t.startsWith('+');
  const s = nextDay ? t.slice(1) : t;
  const [h, m] = s.split(':').map(Number);
  return (nextDay ? 1440 : 0) + h * 60 + m;
}

// 総分数 → "HH:MM" (翌日なら "翌HH:MM")
function minToTime(min) {
  if (min === null) return '—';
  const nextDay = min >= 1440;
  const m = ((min % 1440) + 1440) % 1440;
  const hh = String(Math.floor(m / 60)).padStart(2, '0');
  const mm = String(m % 60).padStart(2, '0');
  return (nextDay ? '翌' : '') + hh + ':' + mm;
}

// オフセットを適用した時刻を返す（分を加減算）
function calcTime(baseTime, offsetMin) {
  const base = timeToMin(baseTime);
  if (base === null) return null;
  return base + offsetMin;
}

function applySettings() {
  const dateVal  = document.getElementById('set-date').value;
  const dia      = parseInt(document.getElementById('set-dia').value);
  const cycle    = parseInt(document.getElementById('set-cycle').value);
  const wake     = (parseInt(document.getElementById('set-wake-h').value)||0)*60   + (parseInt(document.getElementById('set-wake-m').value)||0);
  const leave    = (parseInt(document.getElementById('set-leave-h').value)||0)*60  + (parseInt(document.getElementById('set-leave-m').value)||0);
  const arrive   = (parseInt(document.getElementById('set-arrive-h').value)||0)*60 + (parseInt(document.getElementById('set-arrive-m').value)||0);
  const ret      = (parseInt(document.getElementById('set-return-h').value)||0)*60 + (parseInt(document.getElementById('set-return-m').value)||0);

  if (!dateVal || !dia || dia < 1 || dia > cycle || !cycle) {
    document.getElementById('save-msg').textContent = '⚠️ 入力値を確認してください';
    document.getElementById('save-msg').style.color = '#f87171';
    return;
  }

  SETTINGS = {
    baseDate: dateVal, baseDia: dia, cycle: cycle,
    wakeBeforeLeave:   wake,
    leaveBeforeWork:   leave,
    arriveBeforeStart: arrive,
    returnAfterEnd:    ret,
    showOkibo:       document.getElementById('tog-okibo').checked,
    showShukkin:     document.getElementById('tog-shukkin').checked,
    showTochaku:     document.getElementById('tog-tochaku').checked,
    showShukkinTime: document.getElementById('tog-shukkinTime').checked,
    showTaikinTime:  document.getElementById('tog-taikinTime').checked,
    showKikaku:      document.getElementById('tog-kikaku').checked,
  };
  saveSettings(SETTINGS);
  // 設定変更済みフラグをクリア（警告を次回から出さないようにする）
  // ただしデフォルト値のままなら次回起動時にまた警告
  render();
  renderSettings();
  document.getElementById('save-msg').textContent = '✅ 保存しました！';
  document.getElementById('save-msg').style.color = '#34d399';
  setTimeout(() => { const el = document.getElementById('save-msg'); if(el) el.textContent=''; }, 2000);
}

// ========== ファイル保存・読込 ==========
function _makeSaveFilename() {
  const now = new Date();
  const y  = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d  = String(now.getDate()).padStart(2,'0');
  const h  = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  return `出勤管理_${y}${mo}${d}${h}${mi}.json`;
}

function saveAppToFile() {
  const fname = _makeSaveFilename();
  document.getElementById('save-modal-filename').textContent = fname;
  document.getElementById('save-modal-overlay').classList.add('open');
}

function closeSaveModal() {
  document.getElementById('save-modal-overlay').classList.remove('open');
}

async function doExport() {
  const fname = document.getElementById('save-modal-filename').textContent;

  const appData = {
    version: 1,
    savedAt: new Date().toISOString(),
    shiftSettings:     localStorage.getItem('shiftSettings')     || null,
    diaOverrides:      localStorage.getItem('diaOverrides')      || null,
    shukkinOverrides:  localStorage.getItem('shukkinOverrides')  || null,
    warningSuppressed: localStorage.getItem('warningSuppressed') || null,
  };
  const json = JSON.stringify(appData, null, 2);

  // showSaveFilePicker対応ブラウザ（Chrome等・HTTPS環境）
  if (window.showSaveFilePicker) {
    try {
      const fh = await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description: 'JSONファイル', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await fh.createWritable();
      await writable.write(json);
      await writable.close();
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
      // SecurityError等は下のフォールバックへ
    }
  }
  // フォールバック（HTTP環境・Safari等）
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

function loadAppFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.shiftSettings)     localStorage.setItem('shiftSettings',     data.shiftSettings);
        if (data.diaOverrides)      localStorage.setItem('diaOverrides',      data.diaOverrides);
        if (data.shukkinOverrides)  localStorage.setItem('shukkinOverrides',  data.shukkinOverrides);
        if (data.warningSuppressed) localStorage.setItem('warningSuppressed', data.warningSuppressed);

        // データ再読み込み
        SETTINGS = loadSettings();
        try { DIA_OVERRIDES     = JSON.parse(localStorage.getItem('diaOverrides') || '{}'); } catch(e) { DIA_OVERRIDES = {}; }
        try { SHUKKIN_OVERRIDES = JSON.parse(localStorage.getItem('shukkinOverrides') || '{}'); } catch(e) { SHUKKIN_OVERRIDES = {}; }
        render();
        if (currentView === 'settings') renderSettings();
        alert('📂 読込完了しました！\nファイル: ' + file.name);
      } catch(err) {
        alert('⚠️ 読込エラー: ファイル形式が正しくありません');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

let numpadTargetH = null;  // 時間inputEl
let numpadTargetM = null;  // 分inputEl
let numpadSeg = 'h';       // 現在編集中: 'h' or 'm'
let numpadValH = '0';
let numpadValM = '00';

function openNumpad(hInput, mInput, title) {
  numpadTargetH = hInput;
  numpadTargetM = mInput;
  numpadValH = hInput.value || '0';
  numpadValM = String(parseInt(mInput.value) || 0).padStart(2, '0');
  numpadSeg = 'h';
  document.getElementById('numpad-title').textContent = title || '時間を設定';
  updateNumpadDisplay();
  selectSeg('h');
  document.getElementById('numpad-overlay').classList.remove('hidden');
  // スマホキーボードを抑止
  hInput.blur(); mInput.blur();
}

function selectSeg(seg) {
  numpadSeg = seg;
  document.getElementById('seg-h').classList.toggle('active', seg === 'h');
  document.getElementById('seg-m').classList.toggle('active', seg === 'm');
}

function updateNumpadDisplay() {
  document.getElementById('seg-h-val').textContent = numpadValH;
  document.getElementById('seg-m-val').textContent = numpadValM.padStart(2,'0');
}

function numpadKey(k) {
  if (numpadSeg === 'h') {
    if (k === 'C') { numpadValH = ''; }
    else if (k === 'del') { numpadValH = numpadValH.length > 1 ? numpadValH.slice(0,-1) : ''; }
    else {
      const next = numpadValH === '' ? k : numpadValH + k;
      numpadValH = next.length > 2 ? next.slice(-2) : next;
    }
  } else {
    if (k === 'C') { numpadValM = ''; }
    else if (k === 'del') { numpadValM = numpadValM.length > 1 ? numpadValM.slice(0,-1) : ''; }
    else {
      const next = (numpadValM === '' || numpadValM === '0') ? k : numpadValM + k;
      let val = parseInt(next);
      if (val > 59) val = 59;
      numpadValM = String(val);
    }
  }
  updateNumpadDisplay();
}

function closeNumpad() {
  document.getElementById('numpad-overlay').classList.add('hidden');
}

function numpadOk() {
  if (numpadTargetH) numpadTargetH.value = parseInt(numpadValH) || 0;
  if (numpadTargetM) numpadTargetM.value = parseInt(numpadValM) || 0;
  closeNumpad();
}

// ダイヤ番号スポット変更テンキー
let diaNumpadDateKey = null;
let diaNumpadVal = '1';
let diaNumpadOriginal = 1;

function openDiaNumpad(dateKey, currentDia) {
  diaNumpadDateKey = dateKey;
  diaNumpadOriginal = getDiaForDate(new Date(dateKey.replace(/-/g,'/')));
  diaNumpadVal = String(DIA_OVERRIDES[dateKey] ?? currentDia);
  // 日付を日本語表示
  const d = new Date(dateKey.replace(/-/g,'/'));
  document.getElementById('dia-numpad-date').textContent =
    d.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });
  document.getElementById('dia-numpad-display').textContent = diaNumpadVal;
  document.getElementById('dia-numpad-overlay').classList.remove('hidden');
}

function closeDiaNumpad() {
  document.getElementById('dia-numpad-overlay').classList.add('hidden');
}

function diaNumpadKey(k) {
  if (k === 'C') { diaNumpadVal = ''; }
  else if (k === 'del') { diaNumpadVal = diaNumpadVal.length > 1 ? diaNumpadVal.slice(0,-1) : ''; }
  else {
    const next = diaNumpadVal === '' ? k : diaNumpadVal + k;
    let val = parseInt(next);
    const cycle = getCycle();
    if (val > cycle) val = cycle;
    if (val < 1) val = 1;
    diaNumpadVal = String(val);
  }
  document.getElementById('dia-numpad-display').textContent = diaNumpadVal;
}

function diaNumpadReset() {
  // スポット上書きを削除して元のダイヤに戻す
  delete DIA_OVERRIDES[diaNumpadDateKey];
  saveDiaOverrides();
  closeDiaNumpad();
  render();
}

function diaNumpadOk() {
  const val = parseInt(diaNumpadVal);
  const cycle = getCycle();
  if (isNaN(val) || val < 1 || val > cycle) {
    document.getElementById('dia-numpad-display').textContent = '!';
    setTimeout(() => { document.getElementById('dia-numpad-display').textContent = diaNumpadVal; }, 600);
    return;
  }
  // 元のダイヤと同じなら上書きを削除
  if (val === diaNumpadOriginal) {
    delete DIA_OVERRIDES[diaNumpadDateKey];
  } else {
    DIA_OVERRIDES[diaNumpadDateKey] = val;
  }
  saveDiaOverrides();
  closeDiaNumpad();
  render();
}

checkDefaultWarning();

// ===== 出勤時間（勤務開始）臨時変更テンキー =====
let _skDateKey = null, _skIdx = 0, _skOrigTime = '', _skSeg = 'h';
let _skH = '0', _skM = '00';

function openShukkinNumpad(dateKey, idx, origTime) {
  _skDateKey = dateKey;
  _skIdx = idx;
  _skOrigTime = origTime;
  var okey = dateKey + '_' + idx;
  var existing = SHUKKIN_OVERRIDES[okey];
  var initMin = (existing !== undefined) ? existing : (timeToMin(origTime) || 0);
  var baseMin = ((initMin % 1440) + 1440) % 1440;
  _skH = String(Math.floor(baseMin / 60));
  _skM = String(baseMin % 60).padStart(2, '0');
  _skSeg = 'h';
  var d = new Date(dateKey.replace(/-/g, '/'));
  document.getElementById('sk-np-date').textContent =
    d.toLocaleDateString('ja-JP', {month:'long', day:'numeric', weekday:'short'});
  _skUpdateDisplay();
  _skSelectSeg('h');
  document.getElementById('sk-np-overlay').classList.remove('hidden');
}
function _skSelectSeg(seg) {
  _skSeg = seg;
  document.getElementById('sk-np-seg-h').classList.toggle('active', seg === 'h');
  document.getElementById('sk-np-seg-m').classList.toggle('active', seg === 'm');
}
function _skUpdateDisplay() {
  document.getElementById('sk-np-h-val').textContent = _skH || '0';
  document.getElementById('sk-np-m-val').textContent = (_skM || '0').padStart(2, '0');
}
function skKey(k) {
  if (_skSeg === 'h') {
    if (k === 'C') { _skH = ''; }
    else if (k === 'del') { _skH = _skH.length > 1 ? _skH.slice(0,-1) : ''; }
    else { var n = (_skH === '' ? k : _skH + k); _skH = n.length > 2 ? n.slice(-2) : n; }
  } else {
    if (k === 'C') { _skM = ''; }
    else if (k === 'del') { _skM = _skM.length > 1 ? _skM.slice(0,-1) : ''; }
    else {
      var n2 = (_skM === '' || _skM === '0') ? k : _skM + k;
      var v = parseInt(n2); if (v > 59) v = 59;
      _skM = String(v);
    }
  }
  _skUpdateDisplay();
}
function skReset() {
  delete SHUKKIN_OVERRIDES[_skDateKey + '_' + _skIdx];
  saveShukkinOverrides();
  document.getElementById('sk-np-overlay').classList.add('hidden');
  render();
}
function skCancel() {
  document.getElementById('sk-np-overlay').classList.add('hidden');
}
function skOk() {
  var h = parseInt(_skH) || 0;
  var m = parseInt(_skM) || 0;
  if (h > 23 || m > 59) { return; }
  var newMin = h * 60 + m;
  var origMin = timeToMin(_skOrigTime);
  var okey = _skDateKey + '_' + _skIdx;
  if (newMin === origMin) { delete SHUKKIN_OVERRIDES[okey]; }
  else { SHUKKIN_OVERRIDES[okey] = newMin; }
  saveShukkinOverrides();
  document.getElementById('sk-np-overlay').classList.add('hidden');
  render();
}
setInterval(updateClock, 30000);
</script>
<!-- ダイヤ番号変更テンキー -->

      <button class="nk" onclick="skKey('1')">1</button>
      <button class="nk" onclick="skKey('2')">2</button>
      <button class="nk" onclick="skKey('3')">3</button>
      <button class="nk nk-clear" onclick="skKey('C')">C</button>
