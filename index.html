<style>

  .settings-input {

  .hm-wrap { display: flex; align-items: center; gap: 4px; }
  .hm-input {
    background: linear-gradient(170deg, #e8f5ee 0%, #d4ede0 100%);
    border: 1px solid rgba(80,160,120,0.45);
    border-bottom: 2px solid rgba(60,130,95,0.5);
    border-radius: 8px;
    color: #2d5a47;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 0;
    text-align: center;

  .unit-label { font-size: 12px; color: #80aa92; margin-left: 4px; white-space: nowrap; }
  .input-unit-wrap { display: flex; align-items: center; }
  .toggle-wrap { position: relative; display: inline-block; width: 50px; height: 28px; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(130,185,155,0.35); border-radius: 28px; transition: 0.3s;
    border: 1px solid rgba(100,180,140,0.3);
  }
  .toggle-slider:before {
    position: absolute; content: "";
    height: 22px; width: 22px; left: 2px; bottom: 2px;
    background: linear-gradient(170deg, #ffffff 0%, #f0f0f0 100%);
    border-radius: 50%; transition: 0.3s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.28), 0 1px 2px rgba(0,0,0,0.15);
  }

  .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(22px); }
  .save-btn {

  .today-dia-display {

    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
  }
  .today-dia-display strong { color: #2d8a5e; font-size: 20px; margin: 0 4px; }
  .numpad-overlay {

  }

function getCycle()   { return parseInt(SETTINGS.cycle) || 57; }

function getDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDiaForDate(date) {
  const start = getBaseDate(); start.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.round((d - start) / 86400000);
  const cycle = getCycle();
  return ((diff + getBaseDia() - 1) % cycle + cycle) % cycle + 1;
}

function getDayType(date) {
  const dow = date.getDay();
  const key = getDateKey(date);
  if (HOLIDAYS.has(key) || dow === 0) return '日祝';
  if (dow === 6) return '土曜';
  return '平日';
}

// 出勤時間臨時変更: key="YYYY-MM-DD_shiftIndex" → 分数
let SHUKKIN_OVERRIDES = {};
try { SHUKKIN_OVERRIDES = JSON.parse(localStorage.getItem('shukkinOverrides') || '{}'); } catch(e) {}
function saveShukkinOverrides() {
  try { localStorage.setItem('shukkinOverrides', JSON.stringify(SHUKKIN_OVERRIDES)); } catch(e) {}
}

function saveDiaOverrides() {
  try { localStorage.setItem('diaOverrides', JSON.stringify(DIA_OVERRIDES)); } catch(e) {}
}

function getSchedule(date) {
  const key = getDateKey(date);
  const dayType = getDayType(date);
  const dia = DIA_OVERRIDES[key] !== undefined ? DIA_OVERRIDES[key] : getDiaForDate(date);
  const diaData = SCHEDULES[String(dia)];
  if (!diaData) return { dia, dayType, kyukyu: true };
  const hasShift = diaData['平日'] || diaData['土曜'] || diaData['日祝'];
  if (!hasShift) return { dia, dayType, kyukyu: true };
  let shiftData = diaData[dayType] || (dayType === '日祝' ? diaData['土曜'] : null);
  if (shiftData && shiftData.yobi) return { dia, dayType, yobi: true };
  if (!shiftData || shiftData.kyukyu) return { dia, dayType, kyukyu: true };
  const rawShifts = Array.isArray(shiftData) ? shiftData : [shiftData];
  const shifts = rawShifts.map(sh => Object.assign({}, sh, {_dateKey: key}));
  return { dia, dayType, shifts };
}

function fmtTime(t) {
  if (!t) return '—';
  if (t.startsWith('+')) return '翌' + t.slice(1);
  return t;
}

// "HH:MM" or "+HH:MM" → 総分数
function timeToMin(t) {
  if (!t) return null;
  const nextDay = t.startsWith('+');
  const s = nextDay ? t.slice(1) : t;
  const [h, m] = s.split(':').map(Number);
  return (nextDay ? 1440 : 0) + h * 60 + m;
}

// 総分数 → "HH:MM" (翌日なら "翌HH:MM")
function minToTime(min) {
  if (min === null) return '—';
  const nextDay = min >= 1440;
  const m = ((min % 1440) + 1440) % 1440;
  const hh = String(Math.floor(m / 60)).padStart(2, '0');
  const mm = String(m % 60).padStart(2, '0');
  return (nextDay ? '翌' : '') + hh + ':' + mm;
}

// オフセットを適用した時刻を返す（分を加減算）
function calcTime(baseTime, offsetMin) {
  const base = timeToMin(baseTime);
  if (base === null) return null;
  return base + offsetMin;
}

function buildShiftCard(shifts, isKyukyu, isYobi) {
  if (isYobi) return `<div class="kyukyu-card"><span class="kyukyu-icon">📋</span><span class="kyukyu-text">予　備</span></div>`;
  if (isKyukyu) {
    return `<div class="kyukyu-card"><span class="kyukyu-icon">🏖️</span><span class="kyukyu-text">公　休</span></div>`;
  }
  const s = SETTINGS;
  // すべて勤務開始時刻（shukkinTime）を基準にオフセット計算
  const wake   = s.wakeBeforeLeave   ?? 90;  // 勤務開始の何分前に起床
  const leave  = s.leaveBeforeWork   ?? 60;  // 勤務開始の何分前に出社
  const arrive = s.arriveBeforeStart ?? 30;  // 勤務開始の何分前に到着
  const retMin = s.returnAfterEnd    ?? 10;  // 退勤後何分で帰宅

  return `<div class="shift-cards">${shifts.map((sh, i) => {
    const dateKey = sh._dateKey || '';
    const shiftIdx = i;
    const overrideKey = dateKey + '_' + i;
    const overrideMin = SHUKKIN_OVERRIDES[overrideKey];
    const isOverride = overrideMin !== undefined;
    const workStartMin  = isOverride ? overrideMin : timeToMin(sh.shukkinTime);
    const workStartColor = isOverride ? '#b8355a' : '#3d9e6e';
    const shukkinOverrideFlag = isOverride ? ' ✎' : '';
    const okiboMin      = workStartMin !== null ? workStartMin - wake   : null;
    const shusshaMin    = workStartMin !== null ? workStartMin - leave  : null;
    const tochakuMin    = workStartMin !== null ? workStartMin - arrive : null;
    const taikinTimeMin = timeToMin(sh.taikinTime);
    const kikakuMin     = taikinTimeMin !== null ? taikinTimeMin + retMin : null;

    return `
    <div class="shift-card">
      ${shifts.length > 1 ? `<div class="shift-sublabel">${i === 0 ? '中間前半' : '中間後半'}</div>` : ''}
      ${s.showOkibo ? `<div class="shift-row">
        <span class="shift-icon">⏰</span>
        <span class="shift-label">① 起床</span>
        <span class="shift-time" style="color:#4a90b8">${minToTime(okiboMin)}</span>
      </div>` : ''}
      ${s.showShukkin ? `<div class="shift-row">
        <span class="shift-icon">🚙</span>
        <span class="shift-label">② 出社（家を出る）</span>
        <span class="shift-time" style="color:#4a90b8">${minToTime(shusshaMin)}</span>
      </div>` : ''}
      ${s.showTochaku ? `<div class="shift-row">
        <span class="shift-icon">🏢</span>
        <span class="shift-label">③ 到着（会社）</span>
        <span class="shift-time" style="color:#4a90b8">${minToTime(tochakuMin)}</span>
      </div>` : ''}
      ${s.showShukkinTime ? `<div class="shift-row" onclick="openShukkinNumpad('${dateKey}',${shiftIdx},'${sh.shukkinTime}')" style="cursor:pointer">
        <span class="shift-icon">▶️</span>
        <span class="shift-label">④ 出勤時間（勤務開始）</span>
        <span class="shift-time" style="color:${workStartColor}">${minToTime(workStartMin)}${shukkinOverrideFlag}</span>
      </div>` : ''}
      ${s.showTaikinTime ? `<div class="shift-row">
        <span class="shift-icon">⏹️</span>
        <span class="shift-label">⑤ 退勤時間（勤務終了）</span>
        <span class="shift-time" style="color:#c07030">${minToTime(taikinTimeMin)}</span>
      </div>` : ''}
      ${s.showKikaku ? `<div class="shift-row">
        <span class="shift-icon">🏠</span>
        <span class="shift-label">⑥ 帰宅（家に到着）</span>
        <span class="shift-time" style="color:#4a90b8">${minToTime(kikakuMin)}</span>
      </div>` : ''}
      ${sh.rosen ? `<div class="rosen-row"><span class="rosen-icon">🚌</span><span class="rosen-label">路線:</span><span class="rosen-val">${sh.rosen}</span></div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function buildDayBlock(date, isToday) {
  const dateKey = getDateKey(date);
  const sched = getSchedule(date);
  const dow = DOWSTR[date.getDay()];
  const isHoliday = HOLIDAYS.has(dateKey);
  const isSat = date.getDay() === 6;
  const isSunHol = date.getDay() === 0 || isHoliday;
  const dowColor = isSunHol ? '#f87171' : isSat ? '#60a5fa' : '#94a3b8';
  const dayTypeLabel = sched.dayType === '日祝' ? (isHoliday ? '祝日' : '日曜') : sched.dayType;
  const dayTypeBg = sched.dayType === '日祝' ? 'rgba(239,80,80,0.18)' : sched.dayType === '土曜' ? 'rgba(60,130,220,0.18)' : 'rgba(80,180,120,0.22)';
  const dayTypeColor = sched.dayType === '日祝' ? '#cc2020' : sched.dayType === '土曜' ? '#1a50aa' : '#1a1a1a';
  const isOverride = DIA_OVERRIDES[dateKey] !== undefined;
  return `
  <div class="day-block${isToday ? ' today' : ''}">
    <div class="day-header">
      <div class="day-num-block">
        <span class="day-num">${date.getDate()}</span>
        <span class="day-dow" style="color:${dowColor}">${dow}</span>
      </div>
      <div style="flex:1">
        ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
        <div class="tags">
          <span class="daytype-tag" style="background:${dayTypeBg};color:${dayTypeColor}">${dayTypeLabel}</span>
          <span class="dia-tag${isOverride ? ' dia-override' : ''}"
            onclick="openDiaNumpad('${dateKey}', ${sched.dia})"
            title="タップでダイヤ番号を変更">ダイヤ ${sched.dia}${isOverride ? ' ✎' : ''}</span>

        </div>
      </div>
    </div>
    <div class="shift-area">${buildShiftCard(sched.shifts, sched.kyukyu, sched.yobi)}</div>
  </div>`;
}

let currentView = 'week';

function switchTab(view, dir) {
  if (view === currentView) return;
  const prev = currentView;
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active',
      (i===0 && view==='week') ||
      (i===1 && view==='ichiran') ||
      (i===2 && view==='settings')
    );
  });

  // スライドアニメーション
  const TABS = ['week', 'ichiran', 'settings'];
  const fromIdx = TABS.indexOf(prev);
  const toIdx   = TABS.indexOf(view);
  const slideDir = (dir !== undefined) ? dir : (toIdx > fromIdx ? -1 : 1);

  const viewMap = {
    week: document.getElementById('view-today-tomorrow'),
    ichiran: document.getElementById('view-ichiran'),
    settings: document.getElementById('view-settings'),
  };
  const incoming = viewMap[view];
  const outgoing = viewMap[prev];

  if (view === 'settings') renderSettings();
  if (view === 'ichiran') renderIchiran();

  // 一覧表はich-wrap内で横スクロールするため overflow:hidden を解除
  const contentEl = document.querySelector('.content');
  if (contentEl) contentEl.style.overflowX = (view === 'ichiran') ? 'visible' : 'hidden';

  // incoming を準備
  incoming.style.transform = `translateX(${-slideDir * 100}%)`;
  incoming.style.transition = 'none';
  incoming.classList.remove('hidden');
  // 他の全ビューを非表示（incoming 以外）
  ['view-today-tomorrow','view-week','view-ichiran','view-settings'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el !== incoming && el !== outgoing) el.classList.add('hidden');
  });

  // outgoing と incoming を同時にスライド
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      incoming.style.transition = 'transform 0.22s ease';
      incoming.style.transform = 'translateX(0)';
      outgoing.style.transition = 'transform 0.22s ease';
      outgoing.style.transform = `translateX(${slideDir * 100}%)`;
      setTimeout(() => {
        outgoing.classList.add('hidden');
        outgoing.style.transform = '';
        outgoing.style.transition = '';
        incoming.style.transition = '';
      }, 230);
    });
  });
}

  ];

  // diaCell: ダイヤ番号セルのHTML（rowspan不使用・毎行出力）
  function diaCell(dia, badge, extra) {
    const badgeHtml = badge ? `<br><span class="ich-badge ${badge.cls}">${badge.label}</span>` : '';
    return `<td class="ich-dia${extra||''}">${'<span class="ich-dia-num">'+dia+'</span>'}${badgeHtml}</td>`;
  }
  function timeRow(dayData, isSecond) {
    if (!dayData) return `<td colspan="7" class="ich-kyukyu">公　　　休</td>`;
    if (dayData.type === '公休') return `<td colspan="7" class="ich-kyukyu">公　　　休</td>`;
    const okibo  = isSecond ? (dayData.okibo2 ||'') : dayData.okibo;
    const shukkin= isSecond ? (dayData.shukkin2||'') : dayData.shukkin;
    const tochaku= isSecond ? (dayData.tochaku2||'') : dayData.tochaku;
    const start  = isSecond ? (dayData.start2 ||'') : dayData.start;
    const taikin = isSecond ? (dayData.taikin2||'') : dayData.taikin;
    const rosen  = isSecond ? '' : (dayData.rosen||'');
    const kitan  = isSecond ? (dayData.kitan2 ||'') : dayData.kitan;
    return `<td class="ich-t">${okibo}</td><td class="ich-t">${shukkin}</td><td class="ich-t">${tochaku}</td><td class="ich-t ich-start">${start}</td><td class="ich-t ich-taikin">${taikin}</td><td class="ich-rosen">${rosen}</td><td class="ich-t">${kitan}</td>`;
  }

  let rows = '';
  for (const d of ICHIRAN) {
    const isMiddle = d.type === '中間';
    const isKyukyu = d.type === '公休';
    const isTeire  = d.type === '手入';
    const isBiko   = d.type === '予備';

    if (isKyukyu) {
      rows += `<tr class="ich-row ich-kyukyu-row">
        ${diaCell(d.dia, null, '')}
        <td class="ich-daytype">—</td>
        <td colspan="7" class="ich-kyukyu">公　　　休</td>
      </tr>`;
      continue;
    }
    if (isTeire || isBiko) {
      const label = isTeire ? '手入' : '予備';
      const badge = { cls: isTeire ? 'ich-teire' : 'ich-biko', label };
      const bikoCell = isTeire ? `<td colspan="7" class="ich-kyukyu" style="color:#8a5500;font-weight:600">${label}</td>` : `<td colspan="7" class="ich-kyukyu" style="color:#2a9a4a;font-weight:700">${label}</td>`;
      rows += `<tr class="ich-row">
        ${diaCell(d.dia, badge, '')}
        <td class="ich-daytype ich-hei">平</td>${d.hei ? timeRow(d.hei, false) : bikoCell}</tr>
      <tr class="ich-row">
        ${diaCell(d.dia, null, ' ich-dia-cont')}
        <td class="ich-daytype ich-doy">土</td>${d.doy ? timeRow(d.doy, false) : bikoCell}</tr>
      <tr class="ich-row ich-last">
        ${diaCell(d.dia, null, ' ich-dia-cont')}
        <td class="ich-daytype ich-nch">日祝</td>${d.nch ? timeRow(d.nch, false) : bikoCell}</tr>`;
      continue;
    }
    if (isMiddle) {
      // 土・日祝が公休の場合はrowが少なくなるのでrowspanを動的計算
      const doyIsKyu = !d.doy || d.doy.type === '公休';
      const nchIsKyu = !d.nch || d.nch.type === '公休';
      // 平前半・平後半・土・日祝の最大4行。土日祝は公休でも行は出す
      const midBadge = { cls: 'ich-middle', label: '中間' };
      rows += `<tr class="ich-row">
        ${diaCell(d.dia, midBadge, '')}
        <td class="ich-daytype ich-hei">平<br><span class="ich-hantei">前半</span></td>${timeRow(d.hei, false)}</tr>
      <tr class="ich-row ich-middle-row">
        ${diaCell(d.dia, null, ' ich-dia-cont')}
        <td class="ich-daytype ich-hei">平<br><span class="ich-hantei">後半</span></td>${timeRow(d.hei, true)}</tr>
      <tr class="ich-row">
        ${diaCell(d.dia, null, ' ich-dia-cont')}
        <td class="ich-daytype ich-doy">土</td>${timeRow(d.doy, false)}</tr>
      <tr class="ich-row ich-last">
        ${diaCell(d.dia, null, ' ich-dia-cont')}
        <td class="ich-daytype ich-nch">日祝</td>${timeRow(d.nch, false)}</tr>`;
      continue;
    }
    // 通常
    rows += `<tr class="ich-row">
      ${diaCell(d.dia, null, '')}
      <td class="ich-daytype ich-hei">平</td>${timeRow(d.hei, false)}</tr>
    <tr class="ich-row">
      ${diaCell(d.dia, null, ' ich-dia-cont')}
      <td class="ich-daytype ich-doy">土</td>${timeRow(d.doy, false)}</tr>
    <tr class="ich-row ich-last">
      ${diaCell(d.dia, null, ' ich-dia-cont')}
      <td class="ich-daytype ich-nch">日祝</td>${timeRow(d.nch, false)}</tr>`;
  }

  document.getElementById('view-ichiran').innerHTML = `
    <div class="section-label">📄 一覧表</div>
    <div class="ich-wrap">
      <table class="ich-table">
        <thead>
          <tr>
            <th class="ich-th-dia">ダイヤ</th>
            <th class="ich-th-day">曜日</th>
            <th class="ich-th">起床</th>
            <th class="ich-th">出勤</th>
            <th class="ich-th">到着</th>
            <th class="ich-th ich-th-start">出勤<br>時間</th>
            <th class="ich-th ich-th-taikin">退勤<br>時間</th>
            <th class="ich-th">路線</th>
            <th class="ich-th">帰宅</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:#888;text-align:center;padding:8px 0 4px">出勤時間の２時間30分前に起床</div>
  `;
}

function togglePreview() {
  // トグル変更を即時にSETTINGSに反映（保存はしない）
  SETTINGS.showOkibo       = document.getElementById('tog-okibo').checked;
  SETTINGS.showShukkin     = document.getElementById('tog-shukkin').checked;
  SETTINGS.showTochaku     = document.getElementById('tog-tochaku').checked;
  SETTINGS.showShukkinTime = document.getElementById('tog-shukkinTime').checked;
  SETTINGS.showTaikinTime  = document.getElementById('tog-taikinTime').checked;
  SETTINGS.showKikaku      = document.getElementById('tog-kikaku').checked;
}

function applySettings() {
  const dateVal  = document.getElementById('set-date').value;
  const dia      = parseInt(document.getElementById('set-dia').textContent);
  const cycle    = parseInt(document.getElementById('set-cycle').textContent);
  const wake     = (parseInt(document.getElementById('set-wake-h').value)||0)*60   + (parseInt(document.getElementById('set-wake-m').value)||0);
  const leave    = (parseInt(document.getElementById('set-leave-h').value)||0)*60  + (parseInt(document.getElementById('set-leave-m').value)||0);
  const arrive   = (parseInt(document.getElementById('set-arrive-h').value)||0)*60 + (parseInt(document.getElementById('set-arrive-m').value)||0);
  const ret      = (parseInt(document.getElementById('set-return-h').value)||0)*60 + (parseInt(document.getElementById('set-return-m').value)||0);

  if (!dateVal || !dia || dia < 1 || dia > cycle || !cycle) {
    document.getElementById('save-msg').textContent = '⚠️ 入力値を確認してください';
    document.getElementById('save-msg').style.color = '#f87171';
    return;
  }

  // 時間オフセットの大小チェック: 0 < arrive < leave < wake
  if (!(arrive > 0 && leave > arrive && wake > leave)) {
    showTimeErrorModal();
    return;
  }

  SETTINGS = {
    baseDate: dateVal, baseDia: dia, cycle: cycle,
    wakeBeforeLeave:   wake,
    leaveBeforeWork:   leave,
    arriveBeforeStart: arrive,
    returnAfterEnd:    ret,
    showOkibo:       document.getElementById('tog-okibo').checked,
    showShukkin:     document.getElementById('tog-shukkin').checked,
    showTochaku:     document.getElementById('tog-tochaku').checked,
    showShukkinTime: document.getElementById('tog-shukkinTime').checked,
    showTaikinTime:  document.getElementById('tog-taikinTime').checked,
    showKikaku:      document.getElementById('tog-kikaku').checked,
  };
  saveSettings(SETTINGS);
  // 設定変更済みフラグをクリア（警告を次回から出さないようにする）
  // ただしデフォルト値のままなら次回起動時にまた警告
  render();
  renderSettings();
  document.getElementById('save-msg').textContent = '✅ 保存しました！';
  document.getElementById('save-msg').style.color = '#34d399';
  setTimeout(() => { const el = document.getElementById('save-msg'); if(el) el.textContent=''; }, 2000);
}

// ========== ファイル保存・読込 ==========
function doExport() {
  const now = new Date();
  const fname = `出勤管理_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.json`;
  const appData = {
    version: 1,
    savedAt: now.toISOString(),
    shiftSettings:     localStorage.getItem('shiftSettings')     || null,
    diaOverrides:      localStorage.getItem('diaOverrides')      || null,
    shukkinOverrides:  localStorage.getItem('shukkinOverrides')  || null,
    warningSuppressed: localStorage.getItem('warningSuppressed') || null,
  };
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  a.click();
  URL.revokeObjectURL(url);
}

function loadAppFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.shiftSettings)     localStorage.setItem('shiftSettings',     data.shiftSettings);
        if (data.diaOverrides)      localStorage.setItem('diaOverrides',      data.diaOverrides);
        if (data.shukkinOverrides)  localStorage.setItem('shukkinOverrides',  data.shukkinOverrides);
        if (data.warningSuppressed) localStorage.setItem('warningSuppressed', data.warningSuppressed);

        // データ再読み込み
        SETTINGS = loadSettings();
        try { DIA_OVERRIDES     = JSON.parse(localStorage.getItem('diaOverrides') || '{}'); } catch(e) { DIA_OVERRIDES = {}; }
        try { SHUKKIN_OVERRIDES = JSON.parse(localStorage.getItem('shukkinOverrides') || '{}'); } catch(e) { SHUKKIN_OVERRIDES = {}; }
        render();
        if (currentView === 'settings') renderSettings();
        alert('📂 読込完了しました！\nファイル: ' + file.name);
      } catch(err) {
        alert('⚠️ 読込エラー: ファイル形式が正しくありません');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

let numpadTargetH = null;  // 時間inputEl
let numpadTargetM = null;  // 分inputEl
let numpadSeg = 'h';       // 現在編集中: 'h' or 'm'
let numpadValH = '0';
let numpadValM = '00';

function openNumpad(hInput, mInput, title) {
  numpadTargetH = hInput;
  numpadTargetM = mInput;
  numpadValH = hInput.value || '0';
  numpadValM = String(parseInt(mInput.value) || 0).padStart(2, '0');
  numpadSeg = 'h';
  document.getElementById('numpad-title').textContent = title || '時間を設定';
  updateNumpadDisplay();
  selectSeg('h');
  document.getElementById('numpad-overlay').classList.remove('hidden');
  // スマホキーボードを抑止
  hInput.blur(); mInput.blur();
}

function selectSeg(seg) {
  if (numpadSeg === 'h' && (numpadValH === '' || numpadValH === undefined)) numpadValH = '0';
  if (numpadSeg === 'm' && (numpadValM === '' || numpadValM === undefined)) numpadValM = '0';
  numpadSeg = seg;
  updateNumpadDisplay();
  document.getElementById('seg-h').classList.toggle('active', seg === 'h');
  document.getElementById('seg-m').classList.toggle('active', seg === 'm');
}

function updateNumpadDisplay() {
  document.getElementById('seg-h-val').textContent = numpadValH;
  document.getElementById('seg-m-val').textContent = numpadValM.padStart(2,'0');
}

function numpadKey(k) {
  if (numpadSeg === 'h') {
    if (k === 'C') { numpadValH = ''; }
    else if (k === 'del') { numpadValH = numpadValH.length > 1 ? numpadValH.slice(0,-1) : ''; }
    else {
      const next = numpadValH === '' ? k : numpadValH + k;
      numpadValH = next.length > 2 ? next.slice(-2) : next;
    }
  } else {
    if (k === 'C') { numpadValM = ''; }
    else if (k === 'del') { numpadValM = numpadValM.length > 1 ? numpadValM.slice(0,-1) : ''; }
    else {
      const next = (numpadValM === '' || numpadValM === '0') ? k : numpadValM + k;
      let val = parseInt(next);
      if (val > 59) val = 59;
      numpadValM = String(val);
    }
  }
  updateNumpadDisplay();
}

function closeNumpad() {
  document.getElementById('numpad-overlay').classList.add('hidden');
}

function numpadOk() {
  if (numpadValH === '' || numpadValH === undefined) numpadValH = '0';
  if (numpadValM === '' || numpadValM === undefined) numpadValM = '0';
  if (numpadTargetH) numpadTargetH.value = parseInt(numpadValH) || 0;
  if (numpadTargetM) numpadTargetM.value = parseInt(numpadValM) || 0;
  closeNumpad();
  updateTimeDiffLabels();
}

function updateTimeDiffLabels() {
  const wakeMin   = (parseInt(document.getElementById('set-wake-h')?.value)||0)*60  + (parseInt(document.getElementById('set-wake-m')?.value)||0);
  const leaveMin  = (parseInt(document.getElementById('set-leave-h')?.value)||0)*60 + (parseInt(document.getElementById('set-leave-m')?.value)||0);
  const arriveMin = (parseInt(document.getElementById('set-arrive-h')?.value)||0)*60+ (parseInt(document.getElementById('set-arrive-m')?.value)||0);

  // 起床→出社の差（wake - leave）
  const wakeToLeave = wakeMin - leaveMin;
  const subWake = document.getElementById('sub-wake');
  if (subWake) {
    if (wakeToLeave > 0) {
      const h = Math.floor(wakeToLeave / 60), m = wakeToLeave % 60;
      subWake.textContent = h > 0
        ? `出社まで ${h}時間${m > 0 ? m + '分' : ''}`
        : `出社まで ${m}分`;
    } else {
      subWake.textContent = '出社まで（要確認）';
    }
  }

  // 出社→到着の差（leave - arrive）
  const leaveToArrive = leaveMin - arriveMin;
  const subLeave = document.getElementById('sub-leave');
  if (subLeave) {
    if (leaveToArrive > 0) {
      const h = Math.floor(leaveToArrive / 60), m = leaveToArrive % 60;
      subLeave.textContent = h > 0
        ? `到着まで ${h}時間${m > 0 ? m + '分' : ''}`
        : `到着まで ${m}分`;
    } else {
      subLeave.textContent = '到着まで（要確認）';
    }
  }
}

  else {

    document.getElementById('dia-numpad-display').textContent = '!';
    setTimeout(() => { document.getElementById('dia-numpad-display').textContent = diaNumpadVal || ''; }, 600);

  if (diaNumpadMode === 'spot') {

    } else {

    render();
  } else {
    document.getElementById(diaNumpadMode === 'dia' ? 'set-dia' : 'set-cycle').textContent = val;
    closeDiaNumpad();
  }
}

// ── スワイプで予定⇔設定を切り替え ──
(function() {
  const el = document.querySelector('.content');
  if (!el) return;

  const TABS = ['week', 'ichiran', 'settings'];
  let startX = 0, startY = 0, startTime = 0, startScrollLeft = 0;

  el.addEventListener('touchstart', function(e) {
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    startTime = Date.now();
    // ich-wrap のスクロール位置を記録
    const wrap = e.target.closest('.ich-wrap');
    startScrollLeft = wrap ? wrap.scrollLeft : 0;
  }, { passive: true });

  el.addEventListener('touchend', function(e) {
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startTime;

    // 水平方向が主体 / 50px以上 / 400ms以内
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 0.8 || dt > 400) return;

    // ich-wrap内で実際に横スクロールが起きていたらタブ切り替えしない
    const wrap = e.target.closest('.ich-wrap');
    if (wrap && Math.abs(wrap.scrollLeft - startScrollLeft) > 5) return;

    const cur = TABS.indexOf(currentView);
    if (dx < 0 && cur < TABS.length - 1) switchTab(TABS[cur + 1], -1);
    if (dx > 0 && cur > 0)              switchTab(TABS[cur - 1],  1);
  }, { passive: true });
})();

// 保存・読込ボタン：touchend のみ登録して Android の touch+click 二重発火を防ぐ
(function() {
  function addTapOnly(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    let touched = false;
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      touched = true;
      fn();
      setTimeout(() => { touched = false; }, 500);
    }, { passive: false });
    el.addEventListener('click', function(e) {
      if (touched) { touched = false; return; }
      fn();
    });
  }
  addTapOnly('btn-save', doExport);
  addTapOnly('btn-load', loadAppFromFile);
})();

    else { var n = (_skH === '' ? k : _skH + k); _skH = n.length > 2 ? n.slice(-2) : n; }
  } else {
    if (k === 'C') { _skM = ''; }
    else if (k === 'del') { _skM = _skM.length > 1 ? _skM.slice(0,-1) : ''; }
    else {
      var n2 = (_skM === '' || _skM === '0') ? k : _skM + k;
      var v = parseInt(n2); if (v > 59) v = 59;
      _skM = String(v);
    }
  }
  _skUpdateDisplay();
}
function skReset() {
  delete SHUKKIN_OVERRIDES[_skDateKey + '_' + _skIdx];
  saveShukkinOverrides();
  document.getElementById('sk-np-overlay').classList.add('hidden');
  render();
}
function skCancel() {
  document.getElementById('sk-np-overlay').classList.add('hidden');
}
function skOk() {
  var h = parseInt(_skH) || 0;
  var m = parseInt(_skM) || 0;
  if (h > 23 || m > 59) {
    var disp = document.getElementById('sk-np-h-val');
    if (disp) { var orig = disp.textContent; disp.textContent = '!'; setTimeout(function(){ disp.textContent = orig; }, 600); }
    return;
  }
  var newMin = h * 60 + m;
  var origMin = timeToMin(_skOrigTime);
  var okey = _skDateKey + '_' + _skIdx;
  if (newMin === origMin) { delete SHUKKIN_OVERRIDES[okey]; }
  else { SHUKKIN_OVERRIDES[okey] = newMin; }
  saveShukkinOverrides();
  document.getElementById('sk-np-overlay').classList.add('hidden');
  render();
}
setInterval(updateClock, 30000);

// ⑤ 日付変わり目（深夜0時）に再描画
(function scheduleMidnightRender() {
  var now = new Date();
  var msToMidnight = (new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1)) - now + 500;
  setTimeout(function() {
    render();
    scheduleMidnightRender();
  }, msToMidnight);
})();
</script>

(function() {
